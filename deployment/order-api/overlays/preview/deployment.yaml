apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-api
    spec:
      containers:
        - name: order-api
          image: ghcr.io/teck-lab/teck-cloud-order-api:preview
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: order-api-config
            - secretRef:
                name: order-api-keycloak
                optional: true
          env:
            - name: Kestrel__Endpoints__Http__Url
              value: http://+:8080
            - name: Kestrel__Endpoints__Http__Protocols
              value: Http1
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
