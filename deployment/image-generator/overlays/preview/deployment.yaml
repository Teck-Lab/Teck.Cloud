apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-generator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-generator
    spec:
      containers:
        - name: image-generator
          image: ghcr.io/teck-lab/teck-cloud/image-generator:preview
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: image-generator-config
            - secretRef:
                name: image-generator-keycloak
                optional: true
          env:
            - name: Kestrel__Endpoints__Http__Url
              value: http://+:8080
            - name: Kestrel__Endpoints__Http__Protocols
              value: Http1
            - name: Kestrel__Endpoints__Grpc__Url
              value: http://+:8081
            - name: Kestrel__Endpoints__Grpc__Protocols
              value: Http2
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
