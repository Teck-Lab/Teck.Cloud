apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-api-flyway-postgres
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
        app.kubernetes.io/component: database-migration
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flyway
          image: redgate/flyway:12.1.0
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - -url=$(FLYWAY_URL)
            - -user=$(FLYWAY_USER)
            - -password=$(FLYWAY_PASSWORD)
            - -locations=filesystem:/flyway/sql
            - -connectRetries=60
            - migrate
          env:
            - name: FLYWAY_URL
              valueFrom:
                secretKeyRef:
                  name: catalog-api-flyway-postgres
                  key: url
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-api-flyway-postgres
                  key: user
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-api-flyway-postgres
                  key: password
          volumeMounts:
            - name: migration-sql
              mountPath: /flyway/sql
              readOnly: true
            - name: temp
              mountPath: /tmp
      volumes:
        - name: migration-sql
          configMap:
            name: catalog-api-flyway-postgres-sql
        - name: temp
          emptyDir: {}