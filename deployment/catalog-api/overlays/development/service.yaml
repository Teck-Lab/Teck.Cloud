apiVersion: v1
kind: Service
metadata:
  name: catalog-api
spec:
  selector:
    app.kubernetes.io/name: catalog-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: grpc
      appProtocol: kubernetes.io/h2c
      port: 81
      targetPort: grpc
      protocol: TCP
