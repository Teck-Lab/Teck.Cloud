apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregate-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aggregate-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aggregate-gateway
    spec:
      containers:
        - name: aggregate-gateway
          image: ghcr.io/teck-lab/teck-cloud-aggregate-gateway:preview
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi