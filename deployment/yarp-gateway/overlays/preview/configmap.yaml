apiVersion: v1
kind: ConfigMap
metadata:
  name: yarp-gateway-config
data:
  Logging__LogLevel__Default: Information
  Logging__LogLevel__Microsoft.AspNetCore: Warning
  Keycloak__realm: Teck.Cloud.Preview
  Keycloak__auth-server-url: https://auth.tecklab.dk/
  Keycloak__ssl-required: none
  Keycloak__resource: teck-web-edge
  Keycloak__verify-token-audience: "true"
  Keycloak__use-resource-role-mappings: "true"
  Keycloak__confidential-port: "0"
  Keycloak__ScalarClientId: scalar-ui
  MultiTenancy__TenantIdHeaderName: X-TenantId
  MultiTenancy__OrganizationClaimName: organization
  MultiTenancy__TenantIdClaimName: tenant_id
  EdgeRouteSecurity__Enabled: "true"
  EdgeRouteSecurity__AdminPathSegment: admin
  EdgeRouteSecurity__EmployeeRole: platform-admin
  Services__CatalogApi__Url: http://catalog-api
  Services__CustomerApi__Url: http://customer-api
  Services__AggregateGateway__Url: http://aggregate-gateway
  ReverseProxy__Routes__aggregate-gateway-openapi__ClusterId: aggregate-gateway
  ReverseProxy__Routes__aggregate-gateway-openapi__Order: "-100"
  ReverseProxy__Routes__aggregate-gateway-openapi__AuthorizationPolicy: anonymous
  ReverseProxy__Routes__aggregate-gateway-openapi__Match__Path: /aggregate/openapi/{documentName}/openapi.json
  ReverseProxy__Routes__aggregate-gateway-openapi__Transforms__0__PathPattern: /openapi/{documentName}/openapi.json
  ReverseProxy__Routes__catalog-openapi__ClusterId: catalog
  ReverseProxy__Routes__catalog-openapi__Order: "-100"
  ReverseProxy__Routes__catalog-openapi__AuthorizationPolicy: anonymous
  ReverseProxy__Routes__catalog-openapi__Match__Path: /catalog/openapi/{documentName}/openapi.json
  ReverseProxy__Routes__catalog-openapi__Transforms__0__PathPattern: /openapi/{documentName}/openapi.json
  ReverseProxy__Routes__customer-openapi__ClusterId: customer
  ReverseProxy__Routes__customer-openapi__Order: "-100"
  ReverseProxy__Routes__customer-openapi__AuthorizationPolicy: anonymous
  ReverseProxy__Routes__customer-openapi__Match__Path: /customer/openapi/{documentName}/openapi.json
  ReverseProxy__Routes__customer-openapi__Transforms__0__PathPattern: /openapi/{documentName}/openapi.json
  ReverseProxy__Routes__customer-admin-create-tenant__ClusterId: customer
  ReverseProxy__Routes__customer-admin-create-tenant__Order: "-10"
  ReverseProxy__Routes__customer-admin-create-tenant__Match__Methods__0: POST
  ReverseProxy__Routes__customer-admin-create-tenant__Match__Path: /customer/v1/Tenants
  ReverseProxy__Routes__customer-admin-create-tenant__Metadata__EdgeAccessPolicy: EmployeeOnly
  ReverseProxy__Routes__customer-admin-create-tenant__Metadata__EdgeTenantPolicy: None
  ReverseProxy__Routes__customer-admin-create-tenant__Transforms__0__PathPattern: /customer/v1/Tenants
  ReverseProxy__Routes__customer-admin-get-tenant__ClusterId: customer
  ReverseProxy__Routes__customer-admin-get-tenant__Order: "-10"
  ReverseProxy__Routes__customer-admin-get-tenant__Match__Methods__0: GET
  ReverseProxy__Routes__customer-admin-get-tenant__Match__Path: /customer/v1/Tenants/{id}
  ReverseProxy__Routes__customer-admin-get-tenant__Metadata__EdgeAccessPolicy: EmployeeOnly
  ReverseProxy__Routes__customer-admin-get-tenant__Metadata__EdgeTenantPolicy: None
  ReverseProxy__Routes__customer-admin-get-tenant__Transforms__0__PathPattern: /customer/v1/Tenants/{id}
  ReverseProxy__Routes__aggregate__ClusterId: aggregate-gateway
  ReverseProxy__Routes__aggregate__Match__Path: /aggregate/{**catch-all}
  ReverseProxy__Routes__aggregate__Metadata__EdgeTenantPolicy: None
  ReverseProxy__Routes__aggregate__Transforms__0__PathPattern: /aggregate/{**catch-all}
  ReverseProxy__Routes__catalog__ClusterId: catalog
  ReverseProxy__Routes__catalog__Match__Path: /catalog/{**catch-all}
  ReverseProxy__Routes__catalog__Transforms__0__PathPattern: /catalog/{**catch-all}
  ReverseProxy__Routes__customer__ClusterId: customer
  ReverseProxy__Routes__customer__Match__Path: /customer/{**catch-all}
  ReverseProxy__Routes__customer__Transforms__0__PathPattern: /customer/{**catch-all}
  ReverseProxy__Clusters__aggregate-gateway__Destinations__Default__Address: http://aggregate-gateway
  ReverseProxy__Clusters__aggregate-gateway__Destinations__Default__AccessTokenClientName: aggregate-gateway
  ReverseProxy__Clusters__aggregate-gateway__Destinations__Default__Swaggers__0__PrefixPath: /aggregate
  ReverseProxy__Clusters__aggregate-gateway__Destinations__Default__Swaggers__0__Paths__0: /openapi/v1/openapi.json
  ReverseProxy__Clusters__catalog__Destinations__Default__Address: http://catalog-api
  ReverseProxy__Clusters__catalog__Destinations__Default__AccessTokenClientName: teck-catalog
  ReverseProxy__Clusters__catalog__Destinations__Default__Swaggers__0__PrefixPath: /catalog
  ReverseProxy__Clusters__catalog__Destinations__Default__Swaggers__0__Paths__0: /openapi/v1/openapi.json
  ReverseProxy__Clusters__catalog__Destinations__Default__Swaggers__0__Paths__1: /openapi/v3/openapi.json
  ReverseProxy__Clusters__customer__Destinations__Default__Address: http://customer-api
  ReverseProxy__Clusters__customer__Destinations__Default__AccessTokenClientName: teck-customer
  ReverseProxy__Clusters__customer__Destinations__Default__Swaggers__0__PrefixPath: /customer
  ReverseProxy__Clusters__customer__Destinations__Default__Swaggers__0__Paths__0: /openapi/v1/openapi.json
  AllowedHosts: "*"