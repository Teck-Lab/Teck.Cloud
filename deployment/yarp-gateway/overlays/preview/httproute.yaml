apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: yarp-gateway
  annotations:
    external-dns.alpha.kubernetes.io/hostname: yarp-gateway-pr-0.tecklab.dk
spec:
  parentRefs:
    - name: external-gateway
      namespace: kgateway-system
  hostnames:
    - yarp-gateway-pr-0.tecklab.dk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: yarp-gateway
          port: 80