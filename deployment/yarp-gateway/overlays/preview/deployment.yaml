apiVersion: apps/v1
kind: Deployment
metadata:
  name: yarp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yarp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yarp-gateway
    spec:
      containers:
        - name: yarp-gateway
          image: ghcr.io/teck-lab/teck-cloud-yarp-gateway:preview
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: yarp-gateway-config
          env:
            - name: Keycloak__credentials__secret
              valueFrom:
                secretKeyRef:
                  name: yarp-gateway-keycloak
                  key: Keycloak__credentials__secret
            - name: PREVIEW_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-connection
                  key: host
            - name: PREVIEW_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-connection
                  key: port
            - name: PREVIEW_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: preview-rabbitmq-default-user
                  key: username
            - name: PREVIEW_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: preview-rabbitmq-default-user
                  key: password
            - name: ConnectionStrings__rabbitmq
              value: rabbitmq://$(PREVIEW_RABBITMQ_USERNAME):$(PREVIEW_RABBITMQ_PASSWORD)@$(PREVIEW_RABBITMQ_HOST):$(PREVIEW_RABBITMQ_PORT)/
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi