apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    reloader.stakater.com/search: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: basket-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: basket-api
    spec:
      imagePullSecrets:
        - name: github-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: basket-api
          image: ghcr.io/teck-lab/teck-cloud/basket:development
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          envFrom:
            - configMapRef:
                name: basket-api-config
            - secretRef:
                name: basket-api-keycloak
                optional: true
          env:
            - name: Kestrel__Endpoints__Http__Url
              value: http://+:8080
            - name: Kestrel__Endpoints__Http__Protocols
              value: Http1
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: basket-api-postgres-connection
                  key: host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: basket-api-postgres-connection
                  key: port
            - name: POSTGRES_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: basket-api-postgres-connection
                  key: database
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: basket-api-postgres-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: basket-api-postgres-app
                  key: password
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-shared-default-user
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-shared-default-user
                  key: password
            - name: ConnectionStrings__db-write
              value: Host=$(POSTGRES_HOST);Database=$(POSTGRES_DATABASE);Username=$(POSTGRES_USERNAME);Password=$(POSTGRES_PASSWORD);Port=$(POSTGRES_PORT)
            - name: ConnectionStrings__rabbitmq
              value: rabbitmq://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@rabbitmq-shared.rabbitmq-system.svc.cluster.local:5672/teck-cloud-core
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
