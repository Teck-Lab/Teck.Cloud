apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-api
    spec:
      containers:
        - name: customer-api
          image: ghcr.io/teck-lab/teck-cloud-customer-api:preview
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: customer-api-config
            - secretRef:
                name: customer-api-keycloak
          env:
            - name: PREVIEW_POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: customer-api-postgres-connection
                  key: host
            - name: PREVIEW_POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: customer-api-postgres-connection
                  key: port
            - name: PREVIEW_POSTGRES_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: customer-api-postgres-connection
                  key: database
            - name: PREVIEW_POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: customer-api-postgres-app
                  key: username
            - name: PREVIEW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer-api-postgres-app
                  key: password
            - name: PREVIEW_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-connection
                  key: host
            - name: PREVIEW_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-connection
                  key: port
            - name: PREVIEW_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: preview-rabbitmq-default-user
                  key: username
            - name: PREVIEW_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: preview-rabbitmq-default-user
                  key: password
            - name: ConnectionStrings__db-write
              value: Host=$(PREVIEW_POSTGRES_HOST);Database=$(PREVIEW_POSTGRES_DATABASE);Username=$(PREVIEW_POSTGRES_USERNAME);Password=$(PREVIEW_POSTGRES_PASSWORD);Port=$(PREVIEW_POSTGRES_PORT)
            - name: ConnectionStrings__db-read
              value: Host=$(PREVIEW_POSTGRES_HOST);Database=$(PREVIEW_POSTGRES_DATABASE);Username=$(PREVIEW_POSTGRES_USERNAME);Password=$(PREVIEW_POSTGRES_PASSWORD);Port=$(PREVIEW_POSTGRES_PORT)
            - name: ConnectionStrings__rabbitmq
              value: rabbitmq://$(PREVIEW_RABBITMQ_USERNAME):$(PREVIEW_RABBITMQ_PASSWORD)@$(PREVIEW_RABBITMQ_HOST):$(PREVIEW_RABBITMQ_PORT)/
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi