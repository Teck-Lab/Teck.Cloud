name: PR Validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.201"
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-label:
    name: Check label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      status: ${{steps.label-check.outputs.label_check}}
    steps:
      - name: check-conventional-commits-labels
        uses: docker://agilepathway/pull-request-label-checker@sha256:14f5f3dfda922496d07d53494e2d2b42885165f90677a1c03d600059b7706a61
        id: label-check
        with:
          none_of: release
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          allow_failure: true

  # ===================================================================
  # DOTNET-AFFECTED: Detect which projects are affected by changes
  # This replaces the generic path-based checks with precise 
  # project-level dependency analysis
  # ===================================================================
  detect-affected:
    name: Detect Affected Projects
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      affected: ${{ steps.finalize.outputs.affected }}
      affected-json: ${{ steps.finalize.outputs.affected_json }}
      has-changes: ${{ steps.finalize.outputs.has_changes }}
      dockerfiles: ${{ steps.finalize.outputs.dockerfiles }}
      deployment_only: ${{ steps.finalize.outputs.deployment_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect deployment-only changes
        id: scope
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch origin $BASE_SHA --depth=1 || true
          git fetch origin $HEAD_SHA --depth=1 || true

          mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if [ ${#CHANGED_FILES[@]} -eq 0 ]; then
            echo "deployment_only=false" >> "$GITHUB_OUTPUT"
            echo "No changed files detected"
            exit 0
          fi

          if printf '%s\n' "${CHANGED_FILES[@]}" | grep -Eqv '^deployment/'; then
            echo "deployment_only=false" >> "$GITHUB_OUTPUT"
            echo "Changes include files outside deployment/"
          else
            echo "deployment_only=true" >> "$GITHUB_OUTPUT"
            echo "Only deployment/ files changed; skipping code-affect analysis"
          fi

      - name: Setup .NET Core
        if: steps.scope.outputs.deployment_only != 'true'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore dotnet tools
        if: steps.scope.outputs.deployment_only != 'true'
        run: dotnet tool restore --tool-manifest .config/dotnet-tools.json

      - name: Run dotnet-affected
        id: affected
        if: steps.scope.outputs.deployment_only != 'true'
        run: |
          # Get the base branch commit (what we're merging into)
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          
          echo "Comparing $BASE_SHA (base) -> $HEAD_SHA (head)"
          
          # Ensure we have both commits in the local git history
          git fetch origin $BASE_SHA --depth=1 || true
          git fetch origin $HEAD_SHA --depth=1 || true
          
          # Verify commits exist
          if ! git cat-file -e $BASE_SHA^{commit} 2>/dev/null; then
            echo "ERROR: Base commit $BASE_SHA not found in git history"
            exit 1
          fi
          
          if ! git cat-file -e $HEAD_SHA^{commit} 2>/dev/null; then
            echo "ERROR: Head commit $HEAD_SHA not found in git history"
            exit 1
          fi
          
          # Run dotnet-affected to generate affected projects
          # - traversal: Creates affected.proj for building/testing
          # - text: Creates affected.txt with list of project paths
          # - json: Creates affected.json with structured data
          dotnet affected \
            --from "$BASE_SHA" \
            --to "$HEAD_SHA" \
            --format text json traversal \
            --output-dir "${{ runner.temp }}/affected" \
            --verbose || EXIT_CODE=$?
          
          # Exit code 166 means no projects changed (this is OK, just skip builds)
          if [ "${EXIT_CODE:-0}" -eq 166 ]; then
            echo "No projects affected by changes"
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "affected=" >> $GITHUB_OUTPUT
            echo "affected-json={}" >> $GITHUB_OUTPUT
            exit 0
          elif [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "dotnet-affected failed with exit code ${EXIT_CODE}"
            exit ${EXIT_CODE}
          fi
          
          # Read the affected projects
          if [ -f "${{ runner.temp }}/affected/affected.txt" ]; then
            AFFECTED=$(cat "${{ runner.temp }}/affected/affected.txt" | tr '\n' ' ')
            echo "Affected projects: $AFFECTED"
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "affected=$AFFECTED" >> $GITHUB_OUTPUT
            
            # Read JSON output for structured data (compact single line)
            if [ -f "${{ runner.temp }}/affected/affected.json" ]; then
              AFFECTED_JSON=$(cat "${{ runner.temp }}/affected/affected.json" | jq -c .)
              echo "affected-json=$AFFECTED_JSON" >> $GITHUB_OUTPUT
            fi
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "affected=" >> $GITHUB_OUTPUT
            echo "affected-json={}" >> $GITHUB_OUTPUT
          fi

      - name: Upload affected.proj artifact
        if: steps.scope.outputs.deployment_only != 'true' && steps.affected.outputs.has-changes == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: affected-projects
          path: ${{ runner.temp }}/affected/affected.proj
          retention-days: 1

      - name: Upload affected projects list
        if: steps.scope.outputs.deployment_only != 'true' && steps.affected.outputs.has-changes == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: affected-list
          path: |
            ${{ runner.temp }}/affected/affected.txt
            ${{ runner.temp }}/affected/affected.json
          retention-days: 1

      - name: Find Dockerfiles for affected projects
        id: find-dockerfiles
        if: steps.scope.outputs.deployment_only != 'true' && steps.affected.outputs.has-changes == 'true'
        run: |
          # Find Dockerfiles that belong to affected projects
          DOCKERFILES="[]"
          
          if [ -f "${{ runner.temp }}/affected/affected.txt" ]; then
            # For each affected project, check if it has a Dockerfile
            DOCKERFILE_PATHS=()
            while IFS= read -r project_path; do
              if [ -z "$project_path" ]; then continue; fi
              
              # Get the directory containing the .csproj
              PROJECT_DIR=$(dirname "$project_path")
              
              # Check if Dockerfile exists in project directory
              if [ -f "$PROJECT_DIR/Dockerfile" ]; then
                DOCKERFILE_PATHS+=("$PROJECT_DIR/Dockerfile")
              fi
            done < "${{ runner.temp }}/affected/affected.txt"
            
            # Convert to JSON array (compact, single line)
            if [ ${#DOCKERFILE_PATHS[@]} -gt 0 ]; then
              DOCKERFILES=$(printf '%s\n' "${DOCKERFILE_PATHS[@]}" | jq -R . | jq -s -c .)
            fi
          fi
          
          echo "dockerfiles=$DOCKERFILES" >> $GITHUB_OUTPUT
          echo "Found Dockerfiles: $DOCKERFILES"

      - name: Format affected projects for PR comment
        if: steps.scope.outputs.deployment_only != 'true' && steps.affected.outputs.has-changes == 'true'
        id: format-affected
        run: |
          # Read affected projects and format them nicely
          AFFECTED_LIST=""
          while IFS= read -r project_path; do
            if [ -z "$project_path" ]; then continue; fi
            
            # Extract project name and category
            PROJECT_NAME=$(basename "$project_path" .csproj)
            
            # Determine category based on path
            if [[ "$project_path" == *"/tests/"* ]]; then
              CATEGORY="🧪 Test"
            elif [[ "$project_path" == *"/Catalog.Api/"* ]] || [[ "$project_path" == *".Api/"* ]]; then
              CATEGORY="🚀 Service"
            elif [[ "$project_path" == *"/Migrator/"* ]]; then
              CATEGORY="🔧 Tool"
            elif [[ "$project_path" == *"/AppHost/"* ]]; then
              CATEGORY="📦 Aspire"
            elif [[ "$project_path" == *".Application/"* ]] || [[ "$project_path" == *".Domain/"* ]] || [[ "$project_path" == *".Infrastructure/"* ]]; then
              CATEGORY="📚 Library"
            else
              CATEGORY="📄 Project"
            fi
            
            AFFECTED_LIST="${AFFECTED_LIST}- ${CATEGORY}: \`${PROJECT_NAME}\`"$'\n'
          done < "${{ runner.temp }}/affected/affected.txt"
          
          # Export as multiline output
          {
            echo 'formatted<<EOF'
            echo "$AFFECTED_LIST"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Comment PR with affected projects
        if: steps.scope.outputs.deployment_only != 'true' && steps.affected.outputs.has-changes == 'true'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        with:
          header: affected-projects
          message: |
            ## 🎯 Affected Projects
            
            ${{ steps.format-affected.outputs.formatted }}
            
            <details>
            <summary>ℹ️ About CI/CD Strategy</summary>
            
            **Testing Strategy:**
            - ⚡ **Build**: Only affected projects are built for fast feedback
            - ✅ **Test**: Non-E2E .NET tests run on every PR to ensure no regressions
            - 🎯 **E2E**: Runs only when `run-e2e` label is added to the PR
            - 🐳 **Docker**: Only affected service Docker images are built to save time
            
            These jobs run **in parallel** for maximum speed.
            
            **Detection Method:**
            Projects are detected using `dotnet-affected`, which tracks:
            - Projects with direct file changes
            - Projects that depend on changed projects
            - Projects affected by NuGet package updates in `Directory.Packages.props`
            - Projects affected by changes to `Directory.Build.props`
            </details>

      - name: Finalize workflow outputs
        id: finalize
        run: |
          if [[ "${{ steps.scope.outputs.deployment_only }}" == "true" ]]; then
            echo "deployment_only=true" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "affected=" >> "$GITHUB_OUTPUT"
            echo 'affected_json={}' >> "$GITHUB_OUTPUT"
            echo 'dockerfiles=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_CHANGES="${{ steps.affected.outputs.has-changes }}"
          AFFECTED="${{ steps.affected.outputs.affected }}"
          AFFECTED_JSON='${{ steps.affected.outputs.affected-json }}'
          DOCKERFILES='${{ steps.find-dockerfiles.outputs.dockerfiles }}'

          echo "deployment_only=false" >> "$GITHUB_OUTPUT"
          echo "has_changes=${HAS_CHANGES:-false}" >> "$GITHUB_OUTPUT"
          echo "affected=${AFFECTED}" >> "$GITHUB_OUTPUT"
          echo "affected_json=${AFFECTED_JSON:-{}}" >> "$GITHUB_OUTPUT"
          echo "dockerfiles=${DOCKERFILES:-[]}" >> "$GITHUB_OUTPUT"


  # ===================================================================
  # JOB 1: Build only affected projects (fast feedback)
  # ===================================================================
  build-affected:
    runs-on: ubuntu-latest
    name: Build affected projects
    needs: [check-label, detect-affected]
    if: ${{ needs.check-label.outputs.status == 'success' && needs.detect-affected.outputs.has-changes == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Download affected.proj
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: affected-projects
          path: ${{ runner.temp }}/affected

      - name: Build affected projects
        run: dotnet build "${{ runner.temp }}/affected/affected.proj" -c Release --no-restore

  # ===================================================================
  # Format Check: Annotate PRs with dotnet format diffs (reviewdog)
  # ===================================================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    needs: [check-label, detect-affected]
    if: ${{ needs.check-label.outputs.status == 'success' && needs.detect-affected.outputs.deployment_only != 'true' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - name: Install reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0
      - name: Restore dependencies
        run: dotnet restore --locked-mode
      - name: Run dotnet format and annotate
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          dotnet format
          git diff | reviewdog -f=diff -name="dotnet-format" \
            -reporter=github-pr-review \
            -filter-mode=nofilter \
              -fail-level=error
  # ===================================================================
  # Hadolint: Lint Dockerfiles and annotate PRs (reviewdog)
  # ===================================================================
  hadolint:
    name: Hadolint Dockerfile Lint
    runs-on: ubuntu-latest
    needs: [check-label, detect-affected]
    if: ${{ needs.check-label.outputs.status == 'success' && needs.detect-affected.outputs.deployment_only != 'true' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run hadolint with reviewdog
        uses: reviewdog/action-hadolint@921946a7ebaaf08ac72607bad67209f4e52b5407 # v1.50.5
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: warning

  # ===================================================================
  # JOB 2: Run non-E2E tests (ensure core regressions)
  # ===================================================================
  test-all:
    runs-on: ubuntu-latest
    name: Test all projects
    timeout-minutes: 45
    needs: [check-label, detect-affected]
    if: ${{ needs.check-label.outputs.status == 'success' && needs.detect-affected.outputs.deployment_only != 'true' }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run .NET tests and collect coverage
        uses: ./.github/actions/dotnet-test-and-coverage
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          coverage-artifact-name: coverage
          coverage-retention-days: '5'

      - name: Publish Code Coverage Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: "Cobertura.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "10 30"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: github.event_name == 'pull_request'
        with:
          header: coverage
          path: code-coverage-results.md

      - name: Upload Test Result Files
        if: always() && hashFiles('**/TestResults/**/*') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results
          path: ${{ github.workspace }}/**/TestResults/**/*
          retention-days: 5

      - name: Publish Test Results
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        if: always() && hashFiles('**/*.trx') != ''
        with:
          name: Tests
          path: "${{ github.workspace }}/**/*.trx"
          reporter: dotnet-trx

  # ===================================================================
  # JOB 3: Generate Wolverine sources for affected API services
  # ===================================================================
  generate-wolverine-codegen:
    runs-on: ubuntu-latest
    name: Generate Wolverine code
    needs: [check-label, detect-affected, build-affected]
    if: ${{ needs.check-label.outputs.status == 'success' && (needs.build-affected.result == 'success' || needs.build-affected.result == 'skipped') && needs.detect-affected.outputs.has-changes == 'true' && needs.detect-affected.outputs.dockerfiles != '[]' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/catalog/Catalog.Api/Dockerfile') || contains(needs.detect-affected.outputs.dockerfiles, 'src/services/customer/Customer.Api/Dockerfile')
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore Catalog.Api
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/catalog/Catalog.Api/Dockerfile')
        run: dotnet restore src/services/catalog/Catalog.Api/Catalog.Api.csproj -r linux-x64

      - name: Restore Customer.Api
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/customer/Customer.Api/Dockerfile')
        run: dotnet restore src/services/customer/Customer.Api/Customer.Api.csproj -r linux-x64

      - name: Build Catalog.Api for code generation
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/catalog/Catalog.Api/Dockerfile')
        run: dotnet build src/services/catalog/Catalog.Api/Catalog.Api.csproj -c Release -r linux-x64 --no-restore

      - name: Build Customer.Api for code generation
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/customer/Customer.Api/Dockerfile')
        run: dotnet build src/services/customer/Customer.Api/Customer.Api.csproj -c Release -r linux-x64 --no-restore

      - name: Generate Wolverine code for Catalog.Api
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/catalog/Catalog.Api/Dockerfile')
        working-directory: src/services/catalog/Catalog.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Catalog.Api.dll codegen write

      - name: Generate Wolverine code for Customer.Api
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/customer/Customer.Api/Dockerfile')
        working-directory: src/services/customer/Customer.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Customer.Api.dll codegen write

      - name: Upload Catalog Wolverine code
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/catalog/Catalog.Api/Dockerfile')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

      - name: Upload Customer Wolverine code
        if: contains(needs.detect-affected.outputs.dockerfiles, 'src/services/customer/Customer.Api/Dockerfile')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

  # ===================================================================
  # JOB 3: Build Docker images for affected services (verify Dockerfiles)
  # ===================================================================
  docker-affected:
    runs-on: ${{ matrix.builder.runner-image }}
    name: Build Docker image
    needs: [check-label, detect-affected, build-affected, generate-wolverine-codegen]
    if: ${{ needs.check-label.outputs.status == 'success' && (needs.build-affected.result == 'success' || needs.build-affected.result == 'skipped') && needs.detect-affected.outputs.has-changes == 'true' && needs.detect-affected.outputs.dockerfiles != '[]' }}
    permissions:
      contents: write
      packages: write
      security-events: write
    
    strategy:
      matrix:
        paths: ${{ fromJson(needs.detect-affected.outputs.dockerfiles) }}
        builder:
          - runner-image: ubuntu-24.04
            platform: linux/amd64
          - runner-image: ubuntu-24.04-arm
            platform: linux/arm64
    
    steps:
      - name: Prepare
        id: build-vars
        run: |
          PLATFORM_PAIR=$(echo '${{ matrix.builder.platform }}' | sed 's/\//-/')
          REPO_LOWER=$(echo '${{ env.REPOSITORY }}' | tr '[:upper:]' '[:lower:]')
          REPO_OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')

          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV
          echo "REPO_OWNER_LOWER=$REPO_OWNER_LOWER" >> $GITHUB_ENV
          echo "PLATFORM_PAIR=$PLATFORM_PAIR" >> $GITHUB_ENV
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "platform_pair=$PLATFORM_PAIR" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Catalog Wolverine code
        if: contains(matrix.paths, 'src/services/catalog/Catalog.Api/Dockerfile')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated

      - name: Download Customer Wolverine code
        if: contains(matrix.paths, 'src/services/customer/Customer.Api/Dockerfile')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated

      - name: Read .NET container versions
        id: dotnet-version
        env:
          DOTNET_ALPINE_VERSION: "3.23"
        run: |
          set -euo pipefail

          SDK_VERSION="$(jq -r '.sdk.version' global.json)"
          CHANNEL_VERSION="$(jq -r '.sdk.version | split(".")[0:2] | join(".")' global.json)"
          RELEASES_URL="https://builds.dotnet.microsoft.com/dotnet/release-metadata/${CHANNEL_VERSION}/releases.json"
          RUNTIME_VERSION="$(curl -fsSL "$RELEASES_URL" | jq -r --arg sdk "$SDK_VERSION" '.releases[] | select(.sdk.version == $sdk) | .sdk["runtime-version"]' | head -n 1)"

          if [ -z "$RUNTIME_VERSION" ] || [ "$RUNTIME_VERSION" = "null" ]; then
            echo "::error::Unable to resolve .NET runtime version for SDK ${SDK_VERSION} from ${RELEASES_URL}"
            exit 1
          fi

          echo "value=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpine=$DOTNET_ALPINE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract service name from Dockerfile path
        id: service-vars
        run: |
          DOCKERFILE_PATH="${{ matrix.paths }}"
          NORMALIZED_DOCKERFILE_PATH=$(echo "$DOCKERFILE_PATH" | sed -E 's|^\./||')
          SERVICE_NAME=$(basename "$(dirname "$DOCKERFILE_PATH")" | tr '[:upper:]' '[:lower:]' | sed 's/\./-/g')
          SERVICE_NAME=$(echo "$SERVICE_NAME" | sed -E 's/-linux-(amd64|arm64)$//')
          SERVICE_PROJECT=$(echo "$NORMALIZED_DOCKERFILE_PATH" | awk -F/ '{for(i=1;i<=NF;i++){if($i=="services" && (i+1)<=NF){print $(i+1); exit}}}')
          if [ -z "$SERVICE_PROJECT" ]; then
            SERVICE_PROJECT="$SERVICE_NAME"
          fi

          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "SERVICE_PROJECT=$SERVICE_PROJECT" >> $GITHUB_ENV
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "service_project=$SERVICE_PROJECT" >> $GITHUB_OUTPUT
          echo "cache_image=ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_PROJECT}:buildcache-${PLATFORM_PAIR}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ steps.build-vars.outputs.repo_lower }}
          tags: ${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: v0.32.1

      - name: Log in to GitHub Container Registry for registry cache
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (no push, registry cache)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.paths }}
          platforms: ${{ matrix.builder.platform }}
          push: false
          load: true
          tags: ${{ steps.service-vars.outputs.service_name }}:test-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.service-vars.outputs.cache_image }}
          cache-to: type=registry,ref=${{ steps.service-vars.outputs.cache_image }},mode=max
          target: build
          network: host
          build-args: |
            DOTNET_SDK_VERSION=${{ steps.dotnet-version.outputs.value }}
            DOTNET_RUNTIME_VERSION=${{ steps.dotnet-version.outputs.runtime }}
            DOTNET_ALPINE_VERSION=${{ steps.dotnet-version.outputs.alpine }}
            VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.repositoryUrl }}
            WEBSITE_URL=https://teck.dk
            DOCS_URL=https://docs.teck.dk

      - name: Build image (no push, scoped GHA cache fallback)
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.paths }}
          platforms: ${{ matrix.builder.platform }}
          push: false
          load: true
          tags: ${{ steps.service-vars.outputs.service_name }}:test-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=buildcache-${{ steps.service-vars.outputs.service_project }}-${{ steps.build-vars.outputs.platform_pair }}
          cache-to: type=gha,mode=max,scope=buildcache-${{ steps.service-vars.outputs.service_project }}-${{ steps.build-vars.outputs.platform_pair }}
          target: build
          network: host
          build-args: |
            DOTNET_SDK_VERSION=${{ steps.dotnet-version.outputs.value }}
            DOTNET_RUNTIME_VERSION=${{ steps.dotnet-version.outputs.runtime }}
            DOTNET_ALPINE_VERSION=${{ steps.dotnet-version.outputs.alpine }}
            VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.repositoryUrl }}
            WEBSITE_URL=https://teck.dk
            DOCS_URL=https://docs.teck.dk

      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        continue-on-error: true
        with:
          version: 'v0.69.3'
          image-ref: ${{ steps.service-vars.outputs.service_name }}:test-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results-${{ steps.service-vars.outputs.service_name }}-${{ steps.build-vars.outputs.platform_pair }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy scan results to Security tab
        if: always() && hashFiles(format('trivy-image-results-{0}-{1}.sarif', steps.service-vars.outputs.service_name, steps.build-vars.outputs.platform_pair)) != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: 'trivy-image-results-${{ steps.service-vars.outputs.service_name }}-${{ steps.build-vars.outputs.platform_pair }}.sarif'
          category: 'trivy-image-${{ steps.service-vars.outputs.service_name }}-${{ steps.build-vars.outputs.platform_pair }}'

      - name: Generate SPDX SBOM and submit to Dependency Graph
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ${{ steps.service-vars.outputs.service_name }}:test-${{ github.sha }}
          format: spdx-json
          dependency-snapshot: true
          upload-artifact: false

  # This job ensures that the required status check always passes, even when other jobs are skipped
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [build-affected, test-all, docker-affected, detect-affected, check-label, format-check, hadolint]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check if build-affected was successful or skipped
        run: |
          if [[ "${{ needs.build-affected.result }}" == "success" ]] || [[ "${{ needs.build-affected.result }}" == "skipped" ]]; then
            echo "✅ Build affected job passed or was skipped - OK"
            exit 0
          else
            echo "❌ Build affected job failed"
            exit 1
          fi
      
      - name: Check if test-all was successful
        run: |
          if [[ "${{ needs.test-all.result }}" == "success" ]] || ([[ "${{ needs.detect-affected.outputs.deployment_only }}" == "true" ]] && [[ "${{ needs.test-all.result }}" == "skipped" ]]); then
            echo "✅ Non-E2E test job passed"
            exit 0
          else
            echo "❌ Non-E2E test job failed or was skipped"
            exit 1
          fi

      - name: Check if docker-affected was successful or skipped
        run: |
          if [[ "${{ needs.docker-affected.result }}" == "success" ]] || [[ "${{ needs.docker-affected.result }}" == "skipped" ]]; then
            echo "✅ Docker build job passed or was skipped - OK"
            exit 0
          else
            echo "❌ Docker build job failed"
            exit 1
          fi

      - name: Check if format-check was successful
        run: |
          if [[ "${{ needs.format-check.result }}" == "success" ]] || ([[ "${{ needs.detect-affected.outputs.deployment_only }}" == "true" ]] && [[ "${{ needs.format-check.result }}" == "skipped" ]]); then
            echo "✅ Format check passed"
            exit 0
          else
            echo "❌ Format check failed"
            exit 1
          fi

      - name: Check if hadolint was successful
        run: |
          if [[ "${{ needs.hadolint.result }}" == "success" ]] || ([[ "${{ needs.detect-affected.outputs.deployment_only }}" == "true" ]] && [[ "${{ needs.hadolint.result }}" == "skipped" ]]); then
            echo "✅ Hadolint passed"
            exit 0
          else
            echo "❌ Hadolint failed"
            exit 1
          fi

      - name: All checks passed
        run: echo "✅ All required checks completed successfully or were skipped"

