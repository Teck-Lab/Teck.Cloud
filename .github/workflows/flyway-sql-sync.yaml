name: Flyway SQL Validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main, next]
    paths:
      - .config/dotnet-tools.json
      - .github/workflows/flyway-sql-sync.yaml
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
      - nuget.config
      - deployment/catalog-api/database/**
      - deployment/customer-api/database/**
      - src/buildingblocks/**
      - src/services/catalog/**
      - src/services/customer/**
      - tools/migrations/**
  push:
    branches: [main, next]
    paths:
      - .config/dotnet-tools.json
      - .github/workflows/flyway-sql-sync.yaml
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
      - nuget.config
      - deployment/catalog-api/database/**
      - deployment/customer-api/database/**
      - src/buildingblocks/**
      - src/services/catalog/**
      - src/services/customer/**
      - tools/migrations/**
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.201"
  FLYWAY_AUTO_COMMIT_MESSAGE: "chore(flyway): refresh generated migration SQL [skip ci]"

concurrency:
  group: flyway-sql-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate-and-sync:
    name: Generate Flyway SQL
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >-
      github.event_name != 'pull_request' ||
      (!contains(github.event.pull_request.title, 'ci skip') &&
       !contains(github.event.pull_request.title, 'skip ci') &&
       (github.event.pull_request.body == null ||
        (!contains(github.event.pull_request.body, 'ci skip') &&
         !contains(github.event.pull_request.body, 'skip ci'))))

    steps:
      - name: Set workflow mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.mode.outputs.checkout_ref }}
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore dotnet tools
        run: dotnet tool restore --tool-manifest .config/dotnet-tools.json

      - name: Generate Flyway SQL
        shell: pwsh
        run: |
          ./tools/migrations/Generate-FlywaySql.ps1 -Providers @('postgres')

      - name: Upload generated Flyway SQL
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: flyway-sql
          path: |
            deployment/catalog-api/database/flyway
            deployment/customer-api/database/flyway
          if-no-files-found: warn

      - name: Commit Flyway SQL to PR branch
        if: steps.mode.outputs.can_push == 'true'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: ${{ env.FLYWAY_AUTO_COMMIT_MESSAGE }}
          branch: ${{ steps.mode.outputs.checkout_ref }}
          file_pattern: deployment/catalog-api/database/flyway deployment/customer-api/database/flyway

      - name: Detect Flyway changes
        id: changes
        if: steps.mode.outputs.can_push != 'true'
        shell: bash
        run: |
          if git diff --quiet -- deployment/catalog-api/database/flyway deployment/customer-api/database/flyway; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff -- deployment/catalog-api/database/flyway deployment/customer-api/database/flyway
          fi

      - name: Fail validation when Flyway output is stale
        if: steps.mode.outputs.can_push != 'true' && steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          echo "::error::Flyway-generated SQL is out of date. Open a same-repo PR or run the Flyway generation workflow path that can push back to the branch."
          exit 1