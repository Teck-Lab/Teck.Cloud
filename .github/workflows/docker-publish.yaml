name: Build and Publish Docker Images

on:
  # Only run when a release is actually published (not on every push to main)
  release:
    types: [published, prereleased]

permissions:
  contents: read

jobs:
  find-services:
    name: Find Docker Publish Targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.find.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Find all Docker publish targets
        id: find
        run: |
          TARGETS_JSON=$(
            {
              for api_dir in src/services/*/*.Api; do
                if [ -f "$api_dir/Containerfile" ]; then
                  SERVICE_NAME=$(echo "$api_dir" | sed -n 's|src/services/\([^/]*\)/.*|\1|p')
                  if [ -n "$SERVICE_NAME" ]; then
                    jq -cn \
                      --arg service_name "$SERVICE_NAME" \
                      --arg dockerfile_path "$api_dir/Containerfile" \
                      '{service_name:$service_name,dockerfile_path:$dockerfile_path}'
                  fi
                fi
              done

              for gateway_dir in src/gateways/*; do
                if [ -f "$gateway_dir/Containerfile" ]; then
                  SERVICE_NAME=$(basename "$gateway_dir" | tr '[:upper:]' '[:lower:]' | sed 's/\./-/g')
                  jq -cn \
                    --arg service_name "$SERVICE_NAME" \
                    --arg dockerfile_path "$gateway_dir/Containerfile" \
                    '{service_name:$service_name,dockerfile_path:$dockerfile_path}'
                fi
              done

              if [ -f "src/migrations/Containerfile" ]; then
                jq -cn \
                  --arg service_name "migrations" \
                  --arg dockerfile_path "src/migrations/Containerfile" \
                  '{service_name:$service_name,dockerfile_path:$dockerfile_path}'
              fi
            } | jq -s -c 'sort_by(.service_name)'
          )

          if [ "$TARGETS_JSON" = "[]" ]; then
            echo "ERROR: No Docker publish targets found"
            exit 1
          fi

          echo "$TARGETS_JSON" | jq -r '.[] | "Found target: \(.service_name) -> \(.dockerfile_path)"'
          echo "targets=$TARGETS_JSON" >> $GITHUB_OUTPUT
          echo "Targets to build: $TARGETS_JSON"

  get-version:
    name: Get Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get version from release
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  build-sign-sbom:
    name: Build, Sign & SBOM - ${{ matrix.target.service_name }}
    needs: [find-services, get-version]
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      matrix:
        target: ${{ fromJson(needs.find-services.outputs.targets) }}
      fail-fast: false
    uses: ./.github/workflows/reusable-build-sign-sbom.yml
    with:
      service-name: ${{ matrix.target.service_name }}
      version: ${{ needs.get-version.outputs.version }}
      dockerfile-path: ${{ matrix.target.dockerfile_path }}
      docker-context: '.'
      postgres-connection: 'Host=localhost;Port=5432;Database=tempdb;Username=postgres;Password=postgres'
      rabbitmq-connection: 'amqp://guest:guest@localhost:5672/'
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

