name: Release

on:
  push:
    branches:
      - main
      - next
    paths-ignore:
      - deployment/**

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  precheck:
    name: Evaluate Release Gate
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - name: Check commit title for skip markers
        id: gate
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          COMMIT_TITLE="${HEAD_COMMIT_MESSAGE%%$'\n'*}"
          COMMIT_TITLE_LOWER=$(echo "$COMMIT_TITLE" | tr '[:upper:]' '[:lower:]')

          if [[ "$COMMIT_TITLE_LOWER" == *"[skip ci]"* || "$COMMIT_TITLE_LOWER" == *"[ci skip]"* || "$COMMIT_TITLE_LOWER" == *"skip ci"* || "$COMMIT_TITLE_LOWER" == *"ci skip"* ]]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release for commit title: $COMMIT_TITLE"
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "Release enabled for commit title: $COMMIT_TITLE"
          fi

  validate-flyway-sql:
    name: Validate Flyway SQL
    needs: precheck
    if: needs.precheck.outputs.should-run == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/flyway-sql-validation.yaml
    with:
      checkout-ref: ${{ github.ref_name }}
      can-push: false
      commit-branch: ''
      upload-artifact: false

  release:
    name: Create Release
    needs: [precheck, validate-flyway-sql]
    runs-on: ubuntu-latest
    if: needs.precheck.outputs.should-run == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.AUTO_RELEASE_APP_ID }}
          private-key: ${{ secrets.AUTO_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Auto
        uses: auto-it/setup-auto@8088350955c4009f66570db1f401fa1e0adb5a38 # v2.0.0

      - name: Create labels
        run: auto create-labels || true
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Debug: show what version Auto would release (helps when shipit skips)
      - name: Show next version (debug)
        run: |
          echo "--- auto version ---"
          auto version || true
          echo "--- auto shipit --dry-run ---"
          auto shipit --dry-run 2>&1 || true
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Release
        run: auto shipit
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
