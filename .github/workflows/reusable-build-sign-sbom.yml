name: Reusable Build, Sign, and SBOM Generation (SLSA L3)

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., catalog)'
        required: true
        type: string
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        type: string
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: true
        type: string
      docker-context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      postgres-connection:
        description: 'PostgreSQL connection string for Wolverine codegen'
        required: false
        type: string
        default: 'Host=localhost;Port=5432;Database=tempdb;Username=postgres;Password=postgres'
      rabbitmq-connection:
        description: 'RabbitMQ connection string for Wolverine codegen'
        required: false
        type: string
        default: 'amqp://guest:guest@localhost:5672/'
    secrets:
      github-token:
        description: 'GitHub token for authentication and release uploads'
        required: true

permissions:
  contents: read

jobs:
  generate-wolverine-codegen:
    name: Generate Wolverine Code
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Setup .NET SDK
        if: inputs.service-name == 'catalog' || inputs.service-name == 'customer'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore Catalog.Api
        if: inputs.service-name == 'catalog'
        run: dotnet restore src/services/catalog/Catalog.Api/Catalog.Api.csproj -r linux-x64

      - name: Restore Customer.Api
        if: inputs.service-name == 'customer'
        run: dotnet restore src/services/customer/Customer.Api/Customer.Api.csproj -r linux-x64

      - name: Build Catalog.Api for code generation
        if: inputs.service-name == 'catalog'
        run: dotnet build src/services/catalog/Catalog.Api/Catalog.Api.csproj -c Release -r linux-x64 --no-restore

      - name: Build Customer.Api for code generation
        if: inputs.service-name == 'customer'
        run: dotnet build src/services/customer/Customer.Api/Customer.Api.csproj -c Release -r linux-x64 --no-restore

      - name: Generate Wolverine code for Catalog.Api
        if: inputs.service-name == 'catalog'
        working-directory: src/services/catalog/Catalog.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Catalog.Api.dll codegen write

      - name: Generate Wolverine code for Customer.Api
        if: inputs.service-name == 'customer'
        working-directory: src/services/customer/Customer.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Customer.Api.dll codegen write

      - name: Upload Catalog Wolverine code
        if: inputs.service-name == 'catalog'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

      - name: Upload Customer Wolverine code
        if: inputs.service-name == 'customer'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    name: Build ${{ inputs.service-name }} (${{ matrix.builder.platform }})
    needs: [generate-wolverine-codegen]
    runs-on: ${{ matrix.builder.runner-image }}
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        builder:
          - runner-image: ubuntu-24.04
            platform: linux/amd64
          - runner-image: ubuntu-24.04-arm
            platform: linux/arm64
      fail-fast: false
    
    outputs:
      digest-amd64: ${{ steps.export-digest.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export-digest.outputs.digest-arm64 }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Download Catalog Wolverine code
        if: inputs.service-name == 'catalog'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated

      - name: Download Customer Wolverine code
        if: inputs.service-name == 'customer'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated

      - name: Read .NET container versions
        id: dotnet-version
        env:
          DOTNET_ALPINE_VERSION: "3.23"
        run: |
          set -euo pipefail

          SDK_VERSION="$(jq -r '.sdk.version' global.json)"
          CHANNEL_VERSION="$(jq -r '.sdk.version | split(".")[0:2] | join(".")' global.json)"
          RELEASES_URL="https://builds.dotnet.microsoft.com/dotnet/release-metadata/${CHANNEL_VERSION}/releases.json"
          RUNTIME_VERSION="$(curl -fsSL "$RELEASES_URL" | jq -r --arg sdk "$SDK_VERSION" '.releases[] | select(.sdk.version == $sdk) | .sdk["runtime-version"]' | head -n 1)"

          if [ -z "$RUNTIME_VERSION" ] || [ "$RUNTIME_VERSION" = "null" ]; then
            echo "::error::Unable to resolve .NET runtime version for SDK ${SDK_VERSION} from ${RELEASES_URL}"
            exit 1
          fi

          echo "value=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpine=$DOTNET_ALPINE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare environment variables
        id: image-vars
        env:
          MATRIX_PLATFORM: ${{ matrix.builder.platform }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          PLATFORM_PAIR=$(echo "$MATRIX_PLATFORM" | sed 's/\//-/')
          REPO_OWNER_LOWER=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}"
          CACHE_IMAGE="${IMAGE_NAME}:buildcache-${PLATFORM_PAIR}"
          echo "platform_pair=$PLATFORM_PAIR" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "cache_image=$CACHE_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image-vars.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ !startsWith(inputs.version, '0.') }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=${{ inputs.service-name }}
            org.opencontainers.image.description=Teck Cloud microservice - ${{ inputs.service-name }}
            org.opencontainers.image.vendor=Teck
            com.teck.service.name=${{ inputs.service-name }}
            com.teck.build.workflow=${{ github.workflow }}
            com.teck.build.run-id=${{ github.run_id }}
            com.teck.build.run-number=${{ github.run_number }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          platforms: ${{ matrix.builder.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ steps.image-vars.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.image-vars.outputs.cache_image }}
          cache-to: type=registry,ref=${{ steps.image-vars.outputs.cache_image }},mode=max
          network: host
          build-args: |
            DOTNET_SDK_VERSION=${{ steps.dotnet-version.outputs.value }}
            DOTNET_RUNTIME_VERSION=${{ steps.dotnet-version.outputs.runtime }}
            DOTNET_ALPINE_VERSION=${{ steps.dotnet-version.outputs.alpine }}
            VERSION=${{ inputs.version }}

      - name: Export digest
        id: export-digest
        env:
          MATRIX_PLATFORM: ${{ matrix.builder.platform }}
          SERVICE_NAME: ${{ inputs.service-name }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          PLATFORM_SUFFIX=""
          case "$MATRIX_PLATFORM" in
            "linux/amd64") PLATFORM_SUFFIX="amd64" ;;
            "linux/arm64") PLATFORM_SUFFIX="arm64" ;;
            *)
              echo "::error::Unsupported platform: $MATRIX_PLATFORM"
              exit 1
              ;;
          esac

          mkdir -p "/tmp/digests/${SERVICE_NAME}"
          touch "/tmp/digests/${SERVICE_NAME}/${BUILD_DIGEST#sha256:}"
          echo "digest-${PLATFORM_SUFFIX}=$BUILD_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ inputs.service-name }}-${{ steps.image-vars.outputs.platform_pair }}
          path: /tmp/digests/${{ inputs.service-name }}/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge ${{ inputs.service-name }} manifests
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
      image-ref: ${{ steps.image-ref.outputs.ref }}
    
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ inputs.service-name }}-*
          merge-multiple: true

      - name: Prepare environment variables
        id: image-vars
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          REPO_OWNER_LOWER=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image-vars.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ !startsWith(inputs.version, '0.') }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}

      - name: Create manifest list and push
        id: merge
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE_NAME: ${{ steps.image-vars.outputs.image_name }}
          SERVICE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          mapfile -t TAGS < <(jq -r '.tags | unique[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${TAGS[@]}"; do
            tag_args+=("-t" "$tag")
          done

          sources=()
          for digest_file in *; do
            [ -f "$digest_file" ] || continue
            sources+=("${IMAGE_NAME}@sha256:${digest_file##*/}")
          done

          if [ ${#sources[@]} -eq 0 ]; then
            echo "::error::No per-platform digests were downloaded for ${IMAGE_NAME}"
            exit 1
          fi

          echo "Creating manifest from ${#sources[@]} digest source(s)"
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
          
          # Inspect the image to get the digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE_NAME}:${SERVICE_VERSION}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image digest: $DIGEST"

      - name: Set image reference
        id: image-ref
        env:
          IMAGE_NAME: ${{ steps.image-vars.outputs.image_name }}
          IMAGE_DIGEST: ${{ steps.merge.outputs.digest }}
        run: |
          echo "ref=${IMAGE_NAME}@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Inspect image
        env:
          IMAGE_NAME: ${{ steps.image-vars.outputs.image_name }}
          SERVICE_VERSION: ${{ inputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${SERVICE_VERSION}"

  scan-vulnerabilities:
    name: Scan ${{ inputs.service-name }} vulnerabilities
    runs-on: ubuntu-latest
    needs: [merge-manifests]
    permissions:
      contents: read
      packages: read
      security-events: write
    
    steps:
      - name: Set image reference
        id: set-image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_DIGEST: ${{ needs.merge-manifests.outputs.digest }}
        run: |
          REPO_OWNER_LOWER=$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}@${IMAGE_DIGEST}"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Image reference: $IMAGE_REF"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        continue-on-error: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.github-token }}
        with:
          version: 'v0.69.3'
          image-ref: ${{ steps.set-image.outputs.ref }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-image-${{ inputs.service-name }}'

      - name: Run Trivy vulnerability scanner (JSON)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.github-token }}
        with:
          version: 'v0.69.3'
          image-ref: ${{ steps.set-image.outputs.ref }}
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true

      - name: Upload Trivy JSON report
        if: always() && hashFiles('trivy-results.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-scan-${{ inputs.service-name }}
          path: trivy-results.json
          retention-days: 90

  generate-sboms:
    name: Generate SBOMs for ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: [merge-manifests]
    permissions:
      contents: write
      packages: read
    outputs:
      spdx-sbom: sbom-${{ inputs.service-name }}.spdx.json
      cyclonedx-sbom: sbom-${{ inputs.service-name }}.cyclonedx.json
    
    steps:
      - name: Set image reference
        id: set-image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_DIGEST: ${{ needs.merge-manifests.outputs.digest }}
        run: |
          REPO_OWNER_LOWER=$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}@${IMAGE_DIGEST}"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Image reference: $IMAGE_REF"
          
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ${{ steps.set-image.outputs.ref }}
          format: spdx-json
          output-file: sbom-${{ inputs.service-name }}.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.github-token }}
          dependency-snapshot: true

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: ${{ steps.set-image.outputs.ref }}
          format: cyclonedx-json
          output-file: sbom-${{ inputs.service-name }}.cyclonedx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.github-token }}

      - name: Upload SPDX SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx-${{ inputs.service-name }}
          path: sbom-${{ inputs.service-name }}.spdx.json
          retention-days: 90

      - name: Upload CycloneDX SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx-${{ inputs.service-name }}
          path: sbom-${{ inputs.service-name }}.cyclonedx.json
          retention-days: 90

  sign-sboms:
    name: Sign SBOMs for ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: [merge-manifests, generate-sboms]
    permissions:
      contents: read
      id-token: write
      attestations: write
    
    steps:
      - name: Set image name
        id: set-image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          REPO_OWNER_LOWER=$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          
      - name: Download SPDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-spdx-${{ inputs.service-name }}

      - name: Download CycloneDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-cyclonedx-${{ inputs.service-name }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign SPDX SBOM with Cosign
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          SPDX_FILE="sbom-${SERVICE_NAME}.spdx.json"
          BUNDLE_FILE="${SPDX_FILE}.bundle"
          SIGNATURE_FILE="${SPDX_FILE}.sig"
          CERTIFICATE_FILE="${SPDX_FILE}.cert"

          cosign sign-blob --yes \
            --bundle "$BUNDLE_FILE" \
            "$SPDX_FILE"
          
          # Extract signature and certificate for separate storage (Cosign bundle v0.3 format)
          jq -r '.messageSignature.signature' "$BUNDLE_FILE" | base64 -d > "$SIGNATURE_FILE"
          jq -r '.verificationMaterial.certificate.rawBytes' "$BUNDLE_FILE" | base64 -d > "$CERTIFICATE_FILE"

      - name: Sign CycloneDX SBOM with Cosign
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          CYCLONEDX_FILE="sbom-${SERVICE_NAME}.cyclonedx.json"
          BUNDLE_FILE="${CYCLONEDX_FILE}.bundle"
          SIGNATURE_FILE="${CYCLONEDX_FILE}.sig"
          CERTIFICATE_FILE="${CYCLONEDX_FILE}.cert"

          cosign sign-blob --yes \
            --bundle "$BUNDLE_FILE" \
            "$CYCLONEDX_FILE"
          
          # Extract signature and certificate (Cosign bundle v0.3 format)
          jq -r '.messageSignature.signature' "$BUNDLE_FILE" | base64 -d > "$SIGNATURE_FILE"
          jq -r '.verificationMaterial.certificate.rawBytes' "$BUNDLE_FILE" | base64 -d > "$CERTIFICATE_FILE"

      - name: Verify SPDX SBOM signature
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          SPDX_FILE="sbom-${SERVICE_NAME}.spdx.json"

          cosign verify-blob \
            --bundle "${SPDX_FILE}.bundle" \
            --certificate-identity-regexp="^https://github.com/${REPOSITORY_NAME}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$SPDX_FILE"

      - name: Verify CycloneDX SBOM signature
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          CYCLONEDX_FILE="sbom-${SERVICE_NAME}.cyclonedx.json"

          cosign verify-blob \
            --bundle "${CYCLONEDX_FILE}.bundle" \
            --certificate-identity-regexp="^https://github.com/${REPOSITORY_NAME}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$CYCLONEDX_FILE"

      - name: Attest SPDX SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ steps.set-image.outputs.name }}
          subject-digest: ${{ needs.merge-manifests.outputs.digest }}
          sbom-path: sbom-${{ inputs.service-name }}.spdx.json

      - name: Upload signed SPDX SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx-signed-${{ inputs.service-name }}
          path: |
            sbom-${{ inputs.service-name }}.spdx.json
            sbom-${{ inputs.service-name }}.spdx.json.sig
            sbom-${{ inputs.service-name }}.spdx.json.cert
            sbom-${{ inputs.service-name }}.spdx.json.bundle
          retention-days: 90

      - name: Upload signed CycloneDX SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx-signed-${{ inputs.service-name }}
          path: |
            sbom-${{ inputs.service-name }}.cyclonedx.json
            sbom-${{ inputs.service-name }}.cyclonedx.json.sig
            sbom-${{ inputs.service-name }}.cyclonedx.json.cert
            sbom-${{ inputs.service-name }}.cyclonedx.json.bundle
          retention-days: 90

  generate-vex:
    name: Generate VEX for ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: [merge-manifests, generate-sboms, scan-vulnerabilities]
    permissions:
      contents: read
      id-token: write
      security-events: write
    env:
      SERVICE_NAME: ${{ inputs.service-name }}
      SERVICE_VERSION: ${{ inputs.version }}
      REPOSITORY_NAME: ${{ github.repository }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      IMAGE_DIGEST: ${{ needs.merge-manifests.outputs.digest }}
    
    steps:
      - name: Set image reference
        id: set-image
        run: |
          REPO_OWNER_LOWER=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_REF="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}@${IMAGE_DIGEST}"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          
      - name: Download SPDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-spdx-${{ inputs.service-name }}

      - name: Download Trivy scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trivy-scan-${{ inputs.service-name }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype scan
        run: |
          SBOM_SOURCE="sbom:sbom-${SERVICE_NAME}.spdx.json"
          grype "$SBOM_SOURCE" \
            --by-cve \
            --quiet \
            --output "json=grype-results.json" \
            --output "sarif=grype-results.sarif"

      - name: Upload Grype results to GitHub Security tab
        if: always() && hashFiles('grype-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: grype-results.sarif
          category: grype-${{ inputs.service-name }}

      - name: Generate OpenVEX document
        env:
          IMAGE_REF: ${{ steps.set-image.outputs.ref }}
          VEX_FILE: vex-${{ inputs.service-name }}.openvex.json
        run: |
          # Create VEX document structure
          cat > "$VEX_FILE" <<EOF
          {
            "@context": "https://openvex.dev/ns/v0.2.0",
          "@id": "https://github.com/${REPOSITORY_NAME}/releases/download/v${SERVICE_VERSION}/${VEX_FILE}",
            "author": "Teck Build System",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "version": "1",
            "tooling": "Grype + Trivy",
            "statements": []
          }
          EOF
          
          # Parse Grype results and add VEX statements
          # For each vulnerability, determine exploitability status
          if [ -f grype-results.json ]; then
          python3 - <<'PY'
          import json
          import os

          vex_file = os.environ["VEX_FILE"]
          image_ref = os.environ["IMAGE_REF"]

          with open("grype-results.json", encoding="utf-8") as file:
            grype = json.load(file)

          with open(vex_file, encoding="utf-8") as file:
            vex = json.load(file)

          statements = []
          for match in grype.get("matches", []):
            vuln = match.get("vulnerability", {})
            vuln_id = vuln.get("id", "")

            fix_versions = vuln.get("fix", {}).get("versions", [])

            status = "affected"
            justification = None

            if not fix_versions:
              status = "under_investigation"

            statement = {
              "vulnerability": {"name": vuln_id},
              "timestamp": vex["timestamp"],
              "products": [{
                "component": {
                  "id": image_ref
                }
              }],
              "status": status
            }

            if justification:
              statement["justification"] = justification

            if fix_versions:
              statement["action_statement"] = f"Update to version {fix_versions[0]} or later"

            statements.append(statement)

          vex["statements"] = statements

          with open(vex_file, "w", encoding="utf-8") as file:
            json.dump(vex, file, indent=2)
          PY
          fi
          
          echo "VEX document generated with $(jq '.statements | length' "$VEX_FILE") statements"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign VEX document
        env:
          VEX_FILE: vex-${{ inputs.service-name }}.openvex.json
        run: |
          BUNDLE_FILE="${VEX_FILE}.bundle"
          SIGNATURE_FILE="${VEX_FILE}.sig"
          CERTIFICATE_FILE="${VEX_FILE}.cert"

          cosign sign-blob --yes \
            --bundle "$BUNDLE_FILE" \
            "$VEX_FILE"
          
          # Extract signature and certificate (Cosign bundle v0.3 format)
          jq -r '.messageSignature.signature' "$BUNDLE_FILE" | base64 -d > "$SIGNATURE_FILE"
          jq -r '.verificationMaterial.certificate.rawBytes' "$BUNDLE_FILE" | base64 -d > "$CERTIFICATE_FILE"

      - name: Verify VEX signature
        env:
          VEX_FILE: vex-${{ inputs.service-name }}.openvex.json
        run: |
          cosign verify-blob \
            --bundle "${VEX_FILE}.bundle" \
            --certificate-identity-regexp="^https://github.com/${REPOSITORY_NAME}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$VEX_FILE"

      - name: Upload VEX artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vex-${{ inputs.service-name }}
          path: |
            vex-${{ inputs.service-name }}.openvex.json
            vex-${{ inputs.service-name }}.openvex.json.sig
            vex-${{ inputs.service-name }}.openvex.json.cert
            vex-${{ inputs.service-name }}.openvex.json.bundle
            grype-results.json
          retention-days: 90

  sign-image:
    name: Sign ${{ inputs.service-name }} image
    runs-on: ubuntu-latest
    needs: [merge-manifests, scan-vulnerabilities]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Set image reference
        id: set-image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_DIGEST: ${{ needs.merge-manifests.outputs.digest }}
        run: |
          REPO_OWNER_LOWER=$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}"
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.github-token }}

      - name: Sign container image
        env:
          IMAGE_REF: ${{ steps.set-image.outputs.ref }}
        run: |
          cosign sign --yes \
            "$IMAGE_REF"

      - name: Verify image signature
        env:
          IMAGE_REF: ${{ steps.set-image.outputs.ref }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          cosign verify \
            --certificate-identity-regexp="^https://github.com/${REPOSITORY_NAME}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$IMAGE_REF"

      - name: Generate build provenance attestation (SLSA L3)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.set-image.outputs.name }}
          subject-digest: ${{ needs.merge-manifests.outputs.digest }}
          push-to-registry: true

  upload-to-release:
    name: Upload artifacts to GitHub Release
    runs-on: ubuntu-latest
    needs: [merge-manifests, sign-sboms, generate-vex, sign-image, scan-vulnerabilities]
    permissions:
      contents: write
    
    steps:
      - name: Set image reference
        id: set-image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ inputs.service-name }}
          IMAGE_DIGEST: ${{ needs.merge-manifests.outputs.digest }}
        run: |
          IMAGE_REF="ghcr.io/${REPOSITORY_OWNER}/teck-cloud/${SERVICE_NAME}@${IMAGE_DIGEST}"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          
      - name: Download signed SPDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-spdx-signed-${{ inputs.service-name }}
          path: artifacts/sbom-spdx-signed-${{ inputs.service-name }}

      - name: Download signed CycloneDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom-cyclonedx-signed-${{ inputs.service-name }}
          path: artifacts/sbom-cyclonedx-signed-${{ inputs.service-name }}

      - name: Download VEX documents
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vex-${{ inputs.service-name }}
          path: artifacts/vex-${{ inputs.service-name }}

      - name: Download Trivy scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: trivy-scan-${{ inputs.service-name }}
          path: artifacts/trivy-scan-${{ inputs.service-name }}

      - name: Organize release artifacts
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
        run: |
          mkdir -p release-assets

          SPDX_ARTIFACT_DIR="artifacts/sbom-spdx-signed-${SERVICE_NAME}"
          CYCLONEDX_ARTIFACT_DIR="artifacts/sbom-cyclonedx-signed-${SERVICE_NAME}"
          VEX_ARTIFACT_DIR="artifacts/vex-${SERVICE_NAME}"
          TRIVY_ARTIFACT_DIR="artifacts/trivy-scan-${SERVICE_NAME}"
          
          # SPDX SBOM files
          cp "$SPDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.spdx.json" release-assets/
          cp "$SPDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.spdx.json.sig" release-assets/
          cp "$SPDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.spdx.json.cert" release-assets/
          
          # CycloneDX SBOM files
          cp "$CYCLONEDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.cyclonedx.json" release-assets/
          cp "$CYCLONEDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.cyclonedx.json.sig" release-assets/
          cp "$CYCLONEDX_ARTIFACT_DIR/sbom-${SERVICE_NAME}.cyclonedx.json.cert" release-assets/
          
          # VEX files
          cp "$VEX_ARTIFACT_DIR/vex-${SERVICE_NAME}.openvex.json" release-assets/
          cp "$VEX_ARTIFACT_DIR/vex-${SERVICE_NAME}.openvex.json.sig" release-assets/
          cp "$VEX_ARTIFACT_DIR/vex-${SERVICE_NAME}.openvex.json.cert" release-assets/
          
          # Trivy scan results
          cp "$TRIVY_ARTIFACT_DIR/trivy-results.json" "release-assets/trivy-scan-${SERVICE_NAME}.json"
          
          ls -lah release-assets/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          RELEASE_VERSION: ${{ inputs.version }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          # Upload all files to the release
          cd release-assets
          for file in *; do
            gh release upload "v${RELEASE_VERSION}" "$file" \
              --repo "$REPOSITORY_NAME" \
              --clobber
          done

      - name: Create release summary
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          RELEASE_VERSION: ${{ inputs.version }}
          IMAGE_REF: ${{ steps.set-image.outputs.ref }}
          REPOSITORY_NAME: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🎉 Build Complete: ${SERVICE_NAME} v${RELEASE_VERSION}
          
          ### 📦 Image Details
          - **Image**: `${IMAGE_REF}`
          - **Version**: `${RELEASE_VERSION}`
          - **Platforms**: linux/amd64, linux/arm64
          - **Signed**: ✅ Yes (Cosign keyless with Sigstore)
          
          ### 📋 SBOMs Generated
          - ✅ SPDX JSON (signed)
          - ✅ CycloneDX JSON (signed)
          
          ### 🛡️ Security Artifacts
          - ✅ VEX document (signed)
          - ✅ Trivy vulnerability scan
          - ✅ SLSA Build L3 provenance attestation
          
          ### 🔐 Verification Commands
          
          **Verify image signature:**
          ```bash
          cosign verify \
            --certificate-identity-regexp="^https://github.com/${REPOSITORY_NAME}/.*" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ${IMAGE_REF}
          ```
          
          **Verify SBOM attestation:**
          ```bash
          gh attestation verify oci://${IMAGE_REF} --owner ${REPOSITORY_OWNER}
          ```
          
          **Download SBOMs from release:**
          ```bash
          gh release download v${RELEASE_VERSION} --pattern "sbom-${SERVICE_NAME}.*"
          ```
          EOF
