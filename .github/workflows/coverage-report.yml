name: Coverage Report

on:
  push:
    branches: [main]
    paths-ignore:
      - deployment/**
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.201"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

concurrency:
  group: coverage-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Publish Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run .NET tests and collect coverage
        uses: ./.github/actions/dotnet-test-and-coverage
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          coverage-artifact-name: coverage-main
          coverage-retention-days: '7'

      - name: Upload coverage to Codecov
        id: codecov_upload_primary
        continue-on-error: true
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          use_oidc: true
          files: ${{ github.workspace }}/Cobertura.xml
          disable_search: true
          fail_ci_if_error: true
          flags: main
          name: teck-cloud-main
          verbose: true

      - name: Wait before retrying Codecov upload
        if: steps.codecov_upload_primary.outcome == 'failure'
        run: sleep 30

      - name: Retry Codecov upload
        id: codecov_upload_retry
        if: steps.codecov_upload_primary.outcome == 'failure'
        continue-on-error: true
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          use_oidc: true
          files: ${{ github.workspace }}/Cobertura.xml
          disable_search: true
          fail_ci_if_error: true
          flags: main
          name: teck-cloud-main
          verbose: true

      - name: Report Codecov upload warning
        if: steps.codecov_upload_primary.outcome == 'failure' && steps.codecov_upload_retry.outcome == 'failure'
        run: |
          echo "::warning::Codecov upload failed after two attempts. The combined coverage artifact is still available from this workflow run."
          {
            echo "### Codecov upload warning"
            echo
            echo "Codecov upload failed after two attempts."
            echo "The combined coverage artifact remains available as the workflow artifact 'coverage-main'."
          } >> "$GITHUB_STEP_SUMMARY"
