name: Coverage Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.201"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

concurrency:
  group: coverage-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Publish Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Install .NET Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Build all projects
        run: dotnet build -c Release --no-restore

      - name: Test all projects with coverage
        run: |
          dotnet test Teck.Cloud.slnx \
            -c Release --no-restore --no-build --verbosity normal \
            --logger trx --collect:"XPlat Code Coverage" \
            --blame --blame-hang-timeout 15m

      - name: Combine Coverage Reports
        uses: danielpalme/ReportGenerator-GitHub-Action@2a82782178b2816d9d6960a7345fdd164791b323 # v5.5.3
        with:
          reports: "**/*.cobertura.xml"
          targetdir: "${{ github.workspace }}"
          reporttypes: "Cobertura"
          verbosity: "Info"
          title: "Code Coverage"
          tag: "${{ github.run_number }}_${{ github.run_id }}"
          customSettings: ""
          toolpath: "reportgeneratortool"

      - name: Upload Combined Coverage XML
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-main
          path: ${{ github.workspace }}/Cobertura.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0561704f0f02c16a585d4c7555e57fa2e44cf909 # v5.5.2
        with:
          use_oidc: true
          files: ${{ github.workspace }}/Cobertura.xml
          disable_search: true
          fail_ci_if_error: true
          flags: main
          name: teck-cloud-main
          verbose: true
