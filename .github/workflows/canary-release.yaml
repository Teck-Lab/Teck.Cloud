name: Canary Release

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, next]
    paths-ignore:
      - deployment/**

permissions:
  contents: read

concurrency:
  group: canary-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Step 0: clean up canary images when the PR is closed/merged ──────────
  cleanup:
    name: Clean Up Canary Images
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Discover service packages
        id: packages
        run: |
          PACKAGES=""
          for api_dir in src/services/*/*.Api; do
            if [ -f "$api_dir/Dockerfile" ]; then
              SERVICE_NAME=$(echo "$api_dir" | sed -n 's|src/services/\([^/]*\)/.*|\1|p' | tr '[:upper:]' '[:lower:]')
              PACKAGES="${PACKAGES:+$PACKAGES,}teck-cloud/${SERVICE_NAME}"
            fi
          done
          for gateway_dir in src/gateways/*; do
            if [ -f "$gateway_dir/Dockerfile" ]; then
              SERVICE_NAME=$(basename "$gateway_dir" | tr '[:upper:]' '[:lower:]' | sed 's/\./-/g')
              PACKAGES="${PACKAGES:+$PACKAGES,}teck-cloud/${SERVICE_NAME}"
            fi
          done
          echo "list=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "Packages to clean: $PACKAGES"

      - name: Delete canary images for PR ${{ github.event.pull_request.number }}
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: ${{ steps.packages.outputs.list }}
          delete-tags: '*canary.${{ github.event.pull_request.number }}.*'
          delete-untagged: false

  # ── Step 1: derive the canary version and find all Dockerfiles ────────────
  compute-version:
    name: Compute Canary Version
    runs-on: ubuntu-latest
    if: >-
      github.event.action != 'closed' &&
      !contains(github.event.pull_request.title, 'ci skip') &&
      !contains(github.event.pull_request.title, 'skip ci') &&
      (github.event.pull_request.body == null ||
      (!contains(github.event.pull_request.body, 'ci skip') &&
       !contains(github.event.pull_request.body, 'skip ci')))
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      short-tag: ${{ steps.version.outputs.short-tag }}
      targets: ${{ steps.find.outputs.targets }}
      build-matrix: ${{ steps.find.outputs.build-matrix }}

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.AUTO_RELEASE_APP_ID }}
          private-key: ${{ secrets.AUTO_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Auto
        uses: auto-it/setup-auto@8088350955c4009f66570db1f401fa1e0adb5a38 # v2.0.0

      - name: Compute Canary Version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SHORT_TAG="canary.${{ github.event.pull_request.number }}.${SHORT_SHA}"

          # `auto version` outputs the bump type (major/minor/patch/skip) without
          # touching GitHub. We then apply that bump to the latest git tag ourselves.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          BUMP=$(auto version 2>/dev/null || echo "patch")

          MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)

          case "$BUMP" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            skip)  NEXT_VERSION="${LATEST_TAG}" ;;
            *)     NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          VERSION="${NEXT_VERSION}-canary.${{ github.event.pull_request.number }}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short-tag=${SHORT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bump: ${BUMP}, Latest: ${LATEST_TAG}, Canary version: ${VERSION}, Short tag: ${SHORT_TAG}"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Find Docker Targets
        id: find
        run: |
          TARGETS_JSON=$(
            {
              for api_dir in src/services/*/*.Api; do
                if [ -f "$api_dir/Dockerfile" ]; then
                  SERVICE_NAME=$(echo "$api_dir" | sed -n 's|src/services/\([^/]*\)/.*|\1|p')
                  if [ -n "$SERVICE_NAME" ]; then
                    jq -cn \
                      --arg service_name "$SERVICE_NAME" \
                      --arg dockerfile_path "$api_dir/Dockerfile" \
                      '{service_name:$service_name,dockerfile_path:$dockerfile_path}'
                  fi
                fi
              done

              for gateway_dir in src/gateways/*; do
                if [ -f "$gateway_dir/Dockerfile" ]; then
                  SERVICE_NAME=$(basename "$gateway_dir" | tr '[:upper:]' '[:lower:]' | sed 's/\./-/g')
                  jq -cn \
                    --arg service_name "$SERVICE_NAME" \
                    --arg dockerfile_path "$gateway_dir/Dockerfile" \
                    '{service_name:$service_name,dockerfile_path:$dockerfile_path}'
                fi
              done
            } | jq -s -c 'sort_by(.service_name)'
          )

          if [ "$TARGETS_JSON" = "[]" ]; then
            echo "ERROR: No Docker targets found"
            exit 1
          fi

          echo "$TARGETS_JSON" | jq -r '.[] | "Found target: \(.service_name) -> \(.dockerfile_path)"'
          echo "targets=$TARGETS_JSON" >> "$GITHUB_OUTPUT"

          # Cartesian product of services × platforms for the build matrix
          BUILD_MATRIX=$(jq -c '[
            .[] | . as $svc |
            [
              ($svc + {"runner": "ubuntu-24.04",     "platform": "linux/amd64", "platform_pair": "linux-amd64"}),
              ($svc + {"runner": "ubuntu-24.04-arm", "platform": "linux/arm64", "platform_pair": "linux-arm64"})
            ][]
          ]' <<< "$TARGETS_JSON")
          echo "build-matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"

  # ── Step 2: generate Wolverine sources outside Docker ───────────────────
  generate-wolverine-codegen:
    name: Generate Wolverine Code
    needs: compute-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore API projects
        run: |
          dotnet restore src/services/catalog/Catalog.Api/Catalog.Api.csproj -r linux-x64
          dotnet restore src/services/customer/Customer.Api/Customer.Api.csproj -r linux-x64

      - name: Build API projects for code generation
        run: |
          dotnet build src/services/catalog/Catalog.Api/Catalog.Api.csproj -c Release -r linux-x64 --no-restore
          dotnet build src/services/customer/Customer.Api/Customer.Api.csproj -c Release -r linux-x64 --no-restore

      - name: Generate Wolverine code for Catalog.Api
        working-directory: src/services/catalog/Catalog.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Catalog.Api.dll codegen write

      - name: Generate Wolverine code for Customer.Api
        working-directory: src/services/customer/Customer.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          Logging__LogLevel__Grpc: Warning
        run: dotnet ./bin/Release/net10.0/linux-x64/Customer.Api.dll codegen write

      - name: Upload Catalog Wolverine code
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

      - name: Upload Customer Wolverine code
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated
          if-no-files-found: error
          retention-days: 1

  # ── Step 3: build per-arch images and push by digest ────────────────────
  build:
    name: Build ${{ matrix.target.service_name }} (${{ matrix.target.platform }})
    needs: [compute-version, generate-wolverine-codegen]
    runs-on: ${{ matrix.target.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: ${{ fromJson(needs.compute-version.outputs.build-matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Catalog Wolverine code
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-catalog
          path: src/services/catalog/Catalog.Api/Internal/Generated

      - name: Download Customer Wolverine code
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wolverine-generated-customer
          path: src/services/customer/Customer.Api/Internal/Generated

      - name: Read .NET container versions
        id: dotnet-version
        env:
          DOTNET_ALPINE_VERSION: "3.23"
        run: |
          set -euo pipefail
          SDK_VERSION="$(jq -r '.sdk.version' global.json)"
          CHANNEL_VERSION="$(jq -r '.sdk.version | split(".")[0:2] | join(".")' global.json)"
          RELEASES_URL="https://builds.dotnet.microsoft.com/dotnet/release-metadata/${CHANNEL_VERSION}/releases.json"
          RUNTIME_VERSION="$(curl -fsSL "$RELEASES_URL" | jq -r --arg sdk "$SDK_VERSION" '.releases[] | select(.sdk.version == $sdk) | .sdk["runtime-version"]' | head -n 1)"

          if [ -z "$RUNTIME_VERSION" ] || [ "$RUNTIME_VERSION" = "null" ]; then
            echo "::error::Unable to resolve .NET runtime version for SDK ${SDK_VERSION}"
            exit 1
          fi

          echo "value=$SDK_VERSION"       >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "alpine=$DOTNET_ALPINE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        id: image-vars
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.target.service_name }}
          PLATFORM_PAIR: ${{ matrix.target.platform_pair }}
        run: |
          REPO_OWNER_LOWER=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "cache_image=${IMAGE_NAME}:buildcache-${PLATFORM_PAIR}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.target.dockerfile_path }}
          platforms: ${{ matrix.target.platform }}
          outputs: type=image,name=${{ steps.image-vars.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ steps.image-vars.outputs.cache_image }}
          cache-to: type=registry,ref=${{ steps.image-vars.outputs.cache_image }},mode=max
          network: host
          build-args: |
            DOTNET_SDK_VERSION=${{ steps.dotnet-version.outputs.value }}
            DOTNET_RUNTIME_VERSION=${{ steps.dotnet-version.outputs.runtime }}
            DOTNET_ALPINE_VERSION=${{ steps.dotnet-version.outputs.alpine }}
            VERSION=${{ needs.compute-version.outputs.version }}

      - name: Export digest
        env:
          SERVICE_NAME: ${{ matrix.target.service_name }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "/tmp/digests/${SERVICE_NAME}"
          touch "/tmp/digests/${SERVICE_NAME}/${BUILD_DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.target.service_name }}-${{ matrix.target.platform_pair }}
          path: /tmp/digests/${{ matrix.target.service_name }}/*
          if-no-files-found: error
          retention-days: 1

  # ── Step 4: merge per-arch digests into a multi-arch manifest ─────────────
  merge:
    name: Merge ${{ matrix.target.service_name }}
    needs: [compute-version, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: ${{ fromJson(needs.compute-version.outputs.targets) }}
      fail-fast: false

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target.service_name }}-*
          merge-multiple: true

      - name: Prepare image name
        id: image-vars
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SERVICE_NAME: ${{ matrix.target.service_name }}
        run: |
          REPO_OWNER_LOWER=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/${REPO_OWNER_LOWER}/teck-cloud/${SERVICE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE_NAME: ${{ steps.image-vars.outputs.image_name }}
          CANARY_TAG: ${{ needs.compute-version.outputs.version }}
          CANARY_SHORT_TAG: ${{ needs.compute-version.outputs.short-tag }}
        run: |
          set -euo pipefail

          sources=()
          for digest_file in *; do
            [ -f "$digest_file" ] || continue
            sources+=("${IMAGE_NAME}@sha256:${digest_file##*/}")
          done

          if [ ${#sources[@]} -eq 0 ]; then
            echo "::error::No per-platform digests were downloaded for ${IMAGE_NAME}"
            exit 1
          fi

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${CANARY_TAG}" \
            -t "${IMAGE_NAME}:${CANARY_SHORT_TAG}" \
            "${sources[@]}"

      - name: Inspect manifest
        env:
          IMAGE_NAME: ${{ steps.image-vars.outputs.image_name }}
          CANARY_TAG: ${{ needs.compute-version.outputs.version }}
          CANARY_SHORT_TAG: ${{ needs.compute-version.outputs.short-tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${CANARY_TAG}"
          docker buildx imagetools inspect "${IMAGE_NAME}:${CANARY_SHORT_TAG}"

  # ── Step 5: label the PR as having a preview build ────────────────────────
  label-preview:
    name: Label PR Preview
    needs: [compute-version, merge]
    runs-on: ubuntu-latest
    if: always() && needs.merge.result == 'success'
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.AUTO_RELEASE_APP_ID }}
          private-key: ${{ secrets.AUTO_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Apply preview label
        id: add-preview-label
        continue-on-error: true
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ steps.generate-token.outputs.token || github.token }}
          configuration-path: .github/labeler.yml
          pr-number: ${{ github.event.pull_request.number }}

      - name: Warn if preview label could not be applied
        if: steps.add-preview-label.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Skipping preview PR label because the workflow token cannot manage labels in the current context."

  # ── Step 6: leave a PR comment listing available canary images ────────────
  comment:
    name: Comment on PR
    needs: [compute-version, merge]
    runs-on: ubuntu-latest
    if: always() && needs.merge.result == 'success'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        continue-on-error: true
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.AUTO_RELEASE_APP_ID }}
          private-key: ${{ secrets.AUTO_RELEASE_APP_PRIVATE_KEY }}

      - name: Build Canary Comment
        id: build-comment
        shell: bash
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          SHORT_TAG: ${{ needs.compute-version.outputs.short-tag }}
          TARGETS_JSON: ${{ needs.compute-version.outputs.targets }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          COMMENT_PATH="$RUNNER_TEMP/canary-comment.md"
          REPO_OWNER_LOWER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

          {
            echo '## 🐤 Canary Build Available'
            echo
            echo "**Version:** \`${VERSION}\`"
            echo "**Short tag:** \`${SHORT_TAG}\`"
            echo
            echo 'Pull the canary images with:'
            echo '```bash'
            echo "$TARGETS_JSON" | jq -r --arg owner "$REPO_OWNER_LOWER" --arg version "$VERSION" '.[] | "docker pull ghcr.io/\($owner)/teck-cloud/\(.service_name):\($version)"'
            echo "$TARGETS_JSON" | jq -r --arg owner "$REPO_OWNER_LOWER" --arg shortTag "$SHORT_TAG" '.[] | "docker pull ghcr.io/\($owner)/teck-cloud/\(.service_name):\($shortTag)"'
            echo '```'
            echo
            echo '> Images are built for `linux/amd64, linux/arm64`. No GitHub release has been created.'
          } > "$COMMENT_PATH"

          echo "path=$COMMENT_PATH" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        id: comment-pr
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token || github.token }}
        with:
          header: canary-build
          path: ${{ steps.build-comment.outputs.path }}

      - name: Warn if PR comment could not be posted
        if: steps.comment-pr.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Skipping canary PR comment because the workflow token cannot post comments in the current context."
