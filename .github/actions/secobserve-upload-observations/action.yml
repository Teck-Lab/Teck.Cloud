name: SecObserve Upload Observations
description: Local wrapper for SecObserve observation uploads using the official scanner image and importer entrypoint.

inputs:
  so_api_base_url:
    description: Base URL of the SecObserve backend.
    required: true
  so_api_token:
    description: API token of the user to be used for the upload.
    required: true
  so_product_name:
    description: Name of the product into which the observations are imported.
    required: true
  so_branch_name:
    description: Name of the product branch into which the observations are imported.
    required: false
  so_file_name:
    description: Name of the report file to upload.
    required: true
  so_parser_name:
    description: Parser name to use for the uploaded report.
    required: true
  so_origin_service:
    description: Service name to be set for imported observations.
    required: false
  so_origin_docker_image_name_tag:
    description: Docker image name and tag to be set for imported observations.
    required: false
  so_origin_endpoint_url:
    description: Endpoint URL to be set for imported observations.
    required: false
  so_suppress_licenses:
    description: Whether license components should be suppressed during import.
    required: false

runs:
  using: composite
  steps:
    - name: Normalize SecObserve API base URL
      id: normalize
      shell: bash
      env:
        RAW_SO_API_BASE_URL: ${{ inputs.so_api_base_url }}
      run: |
        normalized_base_url="${RAW_SO_API_BASE_URL%/}"

        if [[ ! "$normalized_base_url" =~ ^https?:// ]]; then
          normalized_base_url="https://$normalized_base_url"
          echo "::warning::SO_API_BASE_URL did not include a URL scheme. Defaulting to https://"
        fi

        echo "api_base_url=$normalized_base_url" >> "$GITHUB_OUTPUT"

    - name: Upload observations with SecObserve image
      uses: docker://ghcr.io/secobserve/secobserve-scanners:2026_02
      with:
        entrypoint: /entrypoints/entrypoint_importer.sh
      env:
        SO_API_BASE_URL: ${{ steps.normalize.outputs.api_base_url }}
        SO_API_TOKEN: ${{ inputs.so_api_token }}
        SO_PRODUCT_NAME: ${{ inputs.so_product_name }}
        SO_BRANCH_NAME: ${{ inputs.so_branch_name }}
        SO_FILE_NAME: ${{ inputs.so_file_name }}
        SO_PARSER_NAME: ${{ inputs.so_parser_name }}
        SO_ORIGIN_SERVICE: ${{ inputs.so_origin_service }}
        SO_ORIGIN_DOCKER_IMAGE_NAME_TAG: ${{ inputs.so_origin_docker_image_name_tag }}
        SO_ORIGIN_ENDPOINT_URL: ${{ inputs.so_origin_endpoint_url }}
        SO_SUPPRESS_LICENSES: ${{ inputs.so_suppress_licenses }}