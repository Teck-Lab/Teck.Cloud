name: SecObserve Upload SBOM
description: Local wrapper for SecObserve SBOM upload using the official scanner image and SBOM entrypoint.

inputs:
  so_api_base_url:
    description: Base URL of the SecObserve backend.
    required: true
  so_api_token:
    description: API token of the user to be used for the upload.
    required: true
  so_product_name:
    description: Name of the product into which the SBOM is imported.
    required: true
  so_branch_name:
    description: Name of the product branch into which the SBOM is imported.
    required: false
  so_file_name:
    description: Name of the SBOM file to upload.
    required: true
  so_origin_service:
    description: Service name to be set for all imported components.
    required: false

runs:
  using: composite
  steps:
    - name: Upload SBOM with SecObserve image
      uses: docker://ghcr.io/secobserve/secobserve-scanners:2026_02
      with:
        entrypoint: /entrypoints/entrypoint_upload_sbom.sh
      env:
        SO_API_BASE_URL: ${{ inputs.so_api_base_url }}
        SO_API_TOKEN: ${{ inputs.so_api_token }}
        SO_PRODUCT_NAME: ${{ inputs.so_product_name }}
        SO_BRANCH_NAME: ${{ inputs.so_branch_name }}
        SO_FILE_NAME: ${{ inputs.so_file_name }}
        SO_ORIGIN_SERVICE: ${{ inputs.so_origin_service }}